
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<div class="container">
<h2>Classement général</h2>

<canvas id="graph"></canvas>

<table>
<tr><th>Position</th><th>Joueur</th><th>Points</th></tr>
{% for j in classement %}
<tr>
<td>
{% if loop.index == 1 %}🥇
{% elif loop.index == 2 %}🥈
{% elif loop.index == 3 %}🥉
{% else %}{{ loop.index }}
{% endif %}
</td>
<td>{{ j.Participant }}</td>
<td>{{ j.Total }}</td>
</tr>
{% endfor %}
</table>

<script>
const ctx = document.getElementById('graph');
new Chart(ctx, {
type: 'bar',
data: {
labels: {{ joueurs|tojson }},
datasets: [{
label: 'Points',
data: {{ scores|tojson }}
}]
}
});
</script>

</div>
