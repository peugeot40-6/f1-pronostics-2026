<h2>Faire un pronostic</h2>

<form method="POST">

<label>Grand Prix :</label>
<select name="gp" required>
    <option value="">-- Choisir un GP --</option>
    {% for gp in gps %}
        <option value="{{ gp }}">{{ gp }}</option>
    {% endfor %}
</select>

<br><br>

<label>1er :</label>
<select name="p1">
    {% for p in pilotes %}
        <option value="{{ p }}">{{ p }}</option>
    {% endfor %}
</select>

<label>2e :</label>
<select name="p2">
    {% for p in pilotes %}
        <option value="{{ p }}">{{ p }}</option>
    {% endfor %}
</select>

<label>3e :</label>
<select name="p3">
    {% for p in pilotes %}
        <option value="{{ p }}">{{ p }}</option>
    {% endfor %}
</select>

<br><br>

<button type="submit">Valider</button>

</form>
