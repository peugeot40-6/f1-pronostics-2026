<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy F1 — Accueil</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .accueil-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 48px;
    }

    .logo-small {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .logo-small .f1 { color: var(--red); }

    .logout-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--grey);
      text-decoration: none;
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .hero {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-greeting {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 8px;
    }

    .hero-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      color: var(--white);
      line-height: 1;
    }

    .hero-name span { color: var(--red); }

    .hero-stripe {
      width: 40px;
      height: 3px;
      background: var(--red);
      margin: 16px auto 0;
      box-shadow: 0 0 10px var(--red-glow);
    }

    .nav-section {
      max-width: 580px;
      margin: 0 auto;
      width: 100%;
      animation: fadeIn 0.9s ease;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .nav-btn {
      padding: 28px 20px;
    }

    .nav-btn .icon { font-size: 2rem; }
    .nav-btn .label { font-size: 0.8rem; }

    .nav-btn-full {
      grid-column: 1 / -1;
    }

    /* Racing stripe deco */
    .race-deco {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: repeating-linear-gradient(
        to bottom,
        var(--red) 0px,
        var(--red) 20px,
        transparent 20px,
        transparent 40px
      );
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="bg-track"></div>
  <div class="race-deco"></div>

  <div class="accueil-wrap">
    <div class="top-bar">
      <div class="logo-small"><span class="f1">F1</span> Fantasy</div>
      <a href="/logout" class="logout-btn">Quitter ✕</a>
    </div>

    <div class="hero">
      <div class="hero-greeting">Bienvenue sur la grille</div>
      <div class="hero-name">{{ user }}<span>.</span></div>
      <div class="hero-stripe"></div>
    </div>

    <div class="nav-section">
      <div class="nav-grid">
        <a href="/pronostic" class="nav-btn">
          <div class="icon">🏎️</div>
          <div class="label">Pronostic</div>
        </a>
        <a href="/classement" class="nav-btn">
          <div class="icon">🏆</div>
          <div class="label">Classement</div>
        </a>
        <a href="/historique" class="nav-btn">
          <div class="icon">📜</div>
          <div class="label">Historique</div>
        </a>
        {% if user == "Padre" %}
        <a href="/resultats" class="nav-btn" style="border-color: rgba(225,6,0,0.3); color: var(--red);">
          <div class="icon">⚑</div>
          <div class="label">Encoder résultats</div>
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
