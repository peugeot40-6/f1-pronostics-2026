<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy F1 — Résultats</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .page-wrap {
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .page-header {
      max-width: 580px;
      margin: 0 auto 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-title span { color: var(--red); }

    .resultats-card {
      max-width: 580px;
      margin: 0 auto;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .top10-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .pos-select-wrap {
      position: relative;
    }

    .pos-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .pos-1  .pos-label { color: var(--gold); }
    .pos-2  .pos-label { color: var(--silver); }
    .pos-3  .pos-label { color: var(--bronze); }
    .pos-4  .pos-label,
    .pos-5  .pos-label,
    .pos-6  .pos-label,
    .pos-7  .pos-label,
    .pos-8  .pos-label,
    .pos-9  .pos-label,
    .pos-10 .pos-label { color: var(--grey); }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(225,6,0,0.1);
      border: 1px solid rgba(225,6,0,0.3);
      color: var(--red);
      padding: 4px 12px;
      border-radius: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 24px 0;
    }
  </style>
</head>
<script>
  const selects = document.querySelectorAll('select[name^="p"]:not([name="gp"])');

  selects.forEach(sel => {
    sel.addEventListener('change', () => {
      const vals = [...selects].map(s => s.value);

      selects.forEach(s => {
        [...s.options].forEach(opt => {
          const dejaUtilise = vals.includes(opt.value) && s.value !== opt.value;
          opt.disabled = dejaUtilise;
        });
      });
    });
  });
</script>
<body>
  <div class="bg-track"></div>

  <div class="page-wrap">
    <div class="page-header">
      <div class="page-title">⚑ <span>Résultats</span></div>
      <a href="/accueil" class="back-link">← Retour</a>
    </div>

    <div class="resultats-card card">
      <div class="admin-badge">⚙ Mode Admin — Padre</div>

      <form method="POST">
        <div class="form-group">
          <label>Grand Prix</label>
          {% if gps %}
            <select name="gp" required>
              <option value="">— Choisir un GP —</option>
              {% for gp in gps %}
              <option value="{{ gp }}">{{ gp }}</option>
              {% endfor %}
            </select>
          {% else %}
            <p style="color: var(--grey); text-align:center; padding: 20px 0;">
              ✅ Tous les résultats ont été encodés !
            </p>
          {% endif %}
        </div>

        <div class="divider"></div>

        <label style="margin-bottom:16px; display:block;">Top 10</label>
        <div class="top10-grid">
          {% for i in range(1, 11) %}
          <div class="pos-select-wrap pos-{{ i }}">
            <div class="pos-label">P{{ i }}</div>
            <select name="p{{ i }}">
              {% for p in pilotes %}
              <option value="{{ p }}">{{ p }}</option>
              {% endfor %}
            </select>
          </div>
          {% endfor %}
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn btn-primary btn-full">
          Enregistrer les résultats →
        </button>
      </form>
    </div>

    <div style="max-width:580px; margin: 0 auto;">
      <a href="/accueil" class="back-link">← Retour à l'accueil</a>
    </div>
  </div>
</body>
</html>
