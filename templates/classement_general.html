<h1>🏆 Classement général</h1>

<td>
    {% if loop.index == 1 %}🥇
    {% elif loop.index == 2 %}🥈
    {% elif loop.index == 3 %}🥉
    {% endif %}
    {{ joueur }}
</td>
<table border="1">
    <tr>
        <th>Position</th>
        <th>Joueur</th>
        <th>Points</th>
    </tr>

    {% for joueur, points in classement %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ joueur }}</td>
        <td>{{ points }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/accueil">⬅ Retour</a>
